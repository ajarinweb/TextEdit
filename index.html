<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>TextEdit — AjarinWeb</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1c1c1e;
            font-family: -apple-system, 'SF Pro Text', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: pan-x pan-y; /* better touch scrolling */
        }
        /* GLOBAL MENU BAR */
        .global-menu-bar {
            background: rgba(30,30,34,0.75);
            backdrop-filter: blur(28px);
            border-bottom: 0.5px solid rgba(255,255,255,0.15);
            padding: 8px 16px;
            display: flex;
            gap: 12px;
            font-size: clamp(12px, 3vw, 13px);
            font-weight: 500;
            color: #e8e8ef;
            flex-shrink: 0;
            overflow-x: auto;
            white-space: nowrap;
            z-index: 100;
            -webkit-overflow-scrolling: touch;
        }
        .global-menu-bar::-webkit-scrollbar {
            display: none;
        }
        .menu-item {
            position: relative;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: default;
            transition: 0.1s;
            flex-shrink: 0;
        }
        .menu-item:hover { background: rgba(100,110,140,0.5); }
        .dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            background: rgba(28,28,32,0.96);
            backdrop-filter: blur(40px);
            border: 0.5px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 8px 0;
            min-width: 180px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-6px);
            transition: opacity 0.12s ease, transform 0.12s ease;
            pointer-events: none;
            z-index: 200;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        .menu-item:hover .dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
            pointer-events: auto;
        }
        .dropdown-item {
            padding: 8px 16px;
            font-size: 13px;
            color: #f0f0f5;
            display: flex;
            justify-content: space-between;
            cursor: default;
            transition: 0.08s;
        }
        .dropdown-item:hover { background: #2c6eb0; }
        .divider { height: 1px; background: rgba(255,255,255,0.15); margin: 6px 12px; }
        .shortcut-hint { font-size: 11px; color: #9a9aa5; font-family: monospace; }
        
        /* JENDELA WORKSPACE */
        .window-workspace {
            flex: 1;
            margin: 12px 16px 16px;
            background: rgba(28,28,32,0.75);
            backdrop-filter: blur(28px);
            border-radius: 16px;
            border: 0.5px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .window-header {
            background: rgba(36,36,40,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }
        .title-bar {
            padding: 12px 16px 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .traffic-lights {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .traffic {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }
        .window-title {
            font-size: clamp(12px, 4vw, 13px);
            font-weight: 600;
            color: #e0e0e8;
            text-align: center;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 48px;
        }
        /* TOOLBAR RESPONSIF */
        .toolbar {
            padding: 8px 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: nowrap;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            border-top: 0.5px solid rgba(255,255,255,0.05);
        }
        .tool-group {
            display: flex;
            gap: 4px;
            background: rgba(0,0,0,0.3);
            padding: 4px 6px;
            border-radius: 32px;
            border: 0.3px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }
        .tool-btn {
            background: transparent;
            border: none;
            color: #dddde6;
            font-size: clamp(11px, 3vw, 13px);
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 28px;
            cursor: pointer;
            transition: 0.1s;
            font-family: inherit;
            white-space: nowrap;
            touch-action: manipulation;
        }
        .tool-btn:active { background: rgba(100,110,140,0.8); transform: scale(0.96); }
        .tool-btn:hover { background: rgba(100,110,140,0.6); }
        .tool-btn.active { background: #2c6eb0; color: white; }
        .separator {
            width: 1px;
            height: 28px;
            background: rgba(255,255,255,0.2);
            margin: 0 4px;
            flex-shrink: 0;
        }
        
        /* WORKSPACE CONTENT */
        .workspace-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .tab-bar {
            background: rgba(28,28,32,0.6);
            backdrop-filter: blur(12px);
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 2px;
            padding: 6px 8px 0 8px;
            overflow-x: auto;
            flex-shrink: 0;
            -webkit-overflow-scrolling: touch;
        }
        .tab {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(45,45,50,0.7);
            border-radius: 10px 10px 0 0;
            font-size: clamp(11px, 3vw, 12px);
            font-weight: 500;
            cursor: pointer;
            border: 0.5px solid rgba(255,255,255,0.1);
            border-bottom: none;
            flex-shrink: 0;
        }
        .tab.active { background: rgba(110,120,140,0.9); color: white; }
        .tab:active { background: rgba(90,90,100,0.8); }
        .tab-close {
            font-size: 14px;
            cursor: pointer;
            opacity: 0.7;
            padding: 0 4px;
        }
        .tab-close:active { opacity: 1; color: #ff5f56; }
        .new-tab-btn {
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 18px;
            cursor: pointer;
            padding: 0 12px;
            margin-left: 4px;
            font-weight: bold;
        }
        .new-tab-btn:active { color: white; }
        
        /* EDITOR AREA */
        .editor-area {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .split-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            flex-direction: row;
        }
        /* Responsive: pada layar < 768px, split menjadi vertikal */
        @media (max-width: 768px) {
            .split-container {
                flex-direction: column;
            }
            .split-tab-panel {
                border-right: none !important;
                border-bottom: 0.5px solid rgba(255,255,255,0.1);
                min-height: 40%;
            }
        }
        .split-tab-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            border-right: 0.5px solid rgba(255,255,255,0.1);
        }
        .panel-actions {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 50;
        }
        .panel-tab-picker {
            width: 32px;
            height: 32px;
            background: rgba(60,60,70,0.85);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            color: #ddd;
            border: 0.5px solid rgba(255,255,255,0.2);
            transition: 0.1s;
            touch-action: manipulation;
        }
        .panel-tab-picker:active { background: rgba(100,110,140,0.9); }
        .panel-tab-menu {
            position: absolute;
            top: 36px;
            right: 0;
            background: rgba(28,28,32,0.96);
            backdrop-filter: blur(40px);
            border: 0.5px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            min-width: 140px;
            z-index: 300;
            display: none;
        }
        .panel-tab-menu .menu-item {
            padding: 10px 16px;
            font-size: 13px;
            color: #f0f0f5;
            cursor: pointer;
        }
        .panel-tab-menu .menu-item:active { background: #2c6eb0; }
        
        /* RICH EDITOR - FIX LIST MARGIN */
        .rich-editor {
            flex: 1;
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #f0f0f8;
            font-family: 'SF Mono', 'JetBrains Mono', 'Menlo', monospace;
            font-size: 14px;
            line-height: 1.5;
            padding: 16px 20px;
            overflow: auto;
            cursor: text;
            word-wrap: break-word;
        }
        /* Critical fix: list tidak menabrak margin */
        .rich-editor ul,
        .rich-editor ol {
            margin: 0.5em 0;
            padding-left: 1.8em;
            list-style-position: outside;
        }
        .rich-editor li {
            margin: 0.2em 0;
            line-height: 1.4;
        }
        /* Untuk list di dalam contenteditable */
        .rich-editor ul ul,
        .rich-editor ol ul,
        .rich-editor ul ol,
        .rich-editor ol ol {
            margin-left: 1.2em;
        }
        .rich-editor:focus { outline: none; }
        
        .status-bar {
            padding: 6px 16px;
            background: rgba(24,24,28,0.6);
            backdrop-filter: blur(12px);
            border-top: 0.5px solid rgba(255,255,255,0.08);
            font-size: 10px;
            color: #9a9aa5;
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }
        /* Scrollbar custom */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(150,160,180,0.5); border-radius: 10px; }
        
        /* Context menu */
        .context-menu {
            position: fixed;
            background: rgba(32,32,36,0.94);
            backdrop-filter: blur(36px);
            border-radius: 14px;
            border: 0.5px solid rgba(255,255,255,0.2);
            padding: 6px 0;
            min-width: 160px;
            z-index: 10000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            animation: fadeIn 0.08s ease;
        }
        @keyframes fadeIn { from { opacity:0; transform:scale(0.96); } to { opacity:1; transform:scale(1); } }
        .context-item {
            padding: 10px 18px;
            color: #f0f0f8;
            font-size: 14px;
            cursor: pointer;
            touch-action: manipulation;
        }
        .context-item:active { background: #2c6eb0; }
        
        /* Responsive tambahan untuk layar sangat kecil */
        @media (max-width: 480px) {
            .window-workspace {
                margin: 8px;
            }
            .rich-editor {
                padding: 12px;
                font-size: 13px;
            }
            .tool-btn {
                padding: 6px 10px;
            }
            .tab {
                padding: 4px 8px;
            }
        }
    </style>
</head>
<body>
<div class="global-menu-bar">
    <div class="menu-item">TextEdit<div class="dropdown"><div class="dropdown-item" id="aboutApp">About</div><div class="divider"></div><div class="dropdown-item" id="quitApp">Quit</div></div></div>
    <div class="menu-item">File<div class="dropdown"><div class="dropdown-item" id="newDocFile">New <span class="shortcut-hint">⌘N</span></div><div class="dropdown-item" id="openDocFile">Open... <span class="shortcut-hint">⌘O</span></div><div class="dropdown-item" id="saveDocFile">Save <span class="shortcut-hint">⌘S</span></div><div class="dropdown-item" id="saveAsFile">Save As...</div><div class="divider"></div><div class="dropdown-item" id="renameFile">Rename...</div><div class="dropdown-item" id="moveToFile">Move To...</div><div class="divider"></div><div class="dropdown-item" id="closeWindowFile">Close</div></div></div>
    <div class="menu-item">Edit<div class="dropdown"><div class="dropdown-item" id="editUndo">Undo</div><div class="dropdown-item" id="editRedo">Redo</div><div class="divider"></div><div class="dropdown-item" id="editCut">Cut</div><div class="dropdown-item" id="editCopy">Copy</div><div class="dropdown-item" id="editPaste">Paste</div><div class="dropdown-item" id="pasteMatchStyle">Paste & Match Style</div><div class="divider"></div><div class="dropdown-item" id="selectAll">Select All</div></div></div>
    <div class="menu-item">Format<div class="dropdown"><div class="dropdown-item" id="makePlainText">Make Plain Text</div><div class="dropdown-item" id="toggleWrapLines">Wrap Lines</div><div class="divider"></div><div class="dropdown-item" id="fontBigger">Bigger</div><div class="dropdown-item" id="fontSmaller">Smaller</div></div></div>
    <div class="menu-item" id="viewMenu">View<div class="dropdown" id="viewDropdown"></div></div>
    <div class="menu-item">Window<div class="dropdown"><div class="dropdown-item" id="minimizeWindow">Minimize</div><div class="dropdown-item" id="zoomWindow">Zoom</div></div></div>
    <div class="menu-item">Help<div class="dropdown"><div class="dropdown-item" id="helpSearch">Help</div></div></div>
</div>

<div class="window-workspace">
    <div class="window-header">
        <div class="title-bar">
            <div class="traffic-lights"><div class="traffic red"></div><div class="traffic yellow"></div><div class="traffic green"></div></div>
            <div class="window-title" id="windowTitle">Untitled</div>
            <div style="width:44px"></div>
        </div>
        <div class="toolbar" id="toolbar">
            <div class="tool-group"><button class="tool-btn" data-cmd="removeFormat">Plain</button><button class="tool-btn" data-cmd="bold">Bold</button><button class="tool-btn" data-cmd="italic">Italic</button></div>
            <div class="separator"></div>
            <div class="tool-group"><button class="tool-btn" data-cmd="justifyLeft">Left</button><button class="tool-btn" data-cmd="justifyCenter">Center</button><button class="tool-btn" data-cmd="justifyRight">Right</button><button class="tool-btn" data-cmd="justifyFull">Justify</button></div>
            <div class="separator"></div>
            <div class="tool-group"><button class="tool-btn" data-cmd="insertUnorderedList">• List</button><button class="tool-btn" data-cmd="insertOrderedList">1. List</button></div>
        </div>
    </div>
    <div class="workspace-content" id="workspaceContent"></div>
    <div class="status-bar" id="statusBar"><span id="stats">0 karakter, 0 baris</span><span id="modeBadge">Rich Text</span></div>
</div>

<script>
    // ========== UTILITIES ==========
    function sanitizeToPlainText(html) {
        const div = document.createElement('div');
        div.innerHTML = html;
        return div.innerText;
    }
    
    // ========== DATA MODEL ==========
    let tabs = [];
    let nextId = 1;
    let focusedTabId = null;
    let isTabMode = true;
    let isSplit = false;
    let leftTabId = null;
    let rightTabId = null;
    let statusBarVisible = true;
    
    function createTab(name, contentHTML) {
        return { id: nextId++, name: name || 'Untitled', contentHTML: contentHTML || '' };
    }
    
    function addTab(name, contentHTML, setFocus = true) {
        const newTab = createTab(name, contentHTML);
        tabs.push(newTab);
        if (setFocus) focusedTabId = newTab.id;
        if (isSplit && tabs.length < 2) disableSplit();
        renderWorkspace();
        return newTab;
    }
    
    function closeTab(tabId) {
        if (tabs.length <= 1) return;
        const idx = tabs.findIndex(t => t.id === tabId);
        if (idx !== -1) tabs.splice(idx, 1);
        if (focusedTabId === tabId) focusedTabId = tabs[0]?.id || null;
        if (leftTabId === tabId) leftTabId = null;
        if (rightTabId === tabId) rightTabId = null;
        if (isSplit && tabs.length < 2) disableSplit();
        if (isSplit) {
            if (!leftTabId) leftTabId = tabs[0]?.id;
            if (!rightTabId) rightTabId = tabs[1]?.id || (tabs.length > 1 ? tabs[1].id : tabs[0]?.id);
        }
        renderWorkspace();
    }
    
    function setFocusedTab(tabId) {
        if (focusedTabId === tabId) return;
        focusedTabId = tabId;
        updateWindowTitle();
        renderWorkspace();
    }
    
    function renameTab(tabId, newName) {
        const tab = tabs.find(t => t.id === tabId);
        if (tab) tab.name = newName;
        renderWorkspace();
        updateWindowTitle();
    }
    
    function updateTabContent(tabId, html) {
        const tab = tabs.find(t => t.id === tabId);
        if (tab) tab.contentHTML = html;
        updateStats();
    }
    
    function updateWindowTitle() {
        if (!isTabMode) {
            const doc = tabs[0];
            document.getElementById('windowTitle').innerText = doc ? doc.name : 'TextEdit';
        } else if (focusedTabId) {
            const tab = tabs.find(t => t.id === focusedTabId);
            document.getElementById('windowTitle').innerText = tab ? tab.name : 'Untitled';
        } else {
            document.getElementById('windowTitle').innerText = 'TextEdit';
        }
    }
    
    function updateStats() {
        let activeHTML = '';
        if (!isTabMode) {
            if (tabs[0]) activeHTML = tabs[0].contentHTML;
        } else if (focusedTabId) {
            const tab = tabs.find(t => t.id === focusedTabId);
            if (tab) activeHTML = tab.contentHTML;
        }
        const text = sanitizeToPlainText(activeHTML);
        const chars = text.length;
        const lines = text.split(/\r?\n/).length;
        document.getElementById('stats').innerText = `${chars} karakter, ${lines} baris`;
    }
    
    // ========== RENDER ==========
    function renderWorkspace() {
        const container = document.getElementById('workspaceContent');
        container.innerHTML = '';
        
        if (isTabMode) {
            const tabBar = document.createElement('div');
            tabBar.className = 'tab-bar';
            for (let tab of tabs) {
                const tabDiv = document.createElement('div');
                tabDiv.className = `tab ${(!isSplit && focusedTabId === tab.id) ? 'active' : ''}`;
                tabDiv.innerHTML = `<span>${tab.name}</span><span class="tab-close" data-id="${tab.id}">✕</span>`;
                tabDiv.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('tab-close') && !isSplit) setFocusedTab(tab.id);
                });
                tabDiv.querySelector('.tab-close').addEventListener('click', (e) => { e.stopPropagation(); closeTab(tab.id); });
                tabBar.appendChild(tabDiv);
            }
            const newBtn = document.createElement('button');
            newBtn.textContent = '+';
            newBtn.className = 'new-tab-btn';
            newBtn.addEventListener('click', () => addTab('Untitled', ''));
            tabBar.appendChild(newBtn);
            container.appendChild(tabBar);
        }
        
        const editorArea = document.createElement('div');
        editorArea.className = 'editor-area';
        
        if (!isTabMode) {
            const doc = tabs[0];
            if (doc) editorArea.appendChild(createRichEditor(doc));
        } else if (!isSplit) {
            const current = tabs.find(t => t.id === focusedTabId) || tabs[0];
            if (current) editorArea.appendChild(createRichEditor(current));
        } else {
            const splitDiv = document.createElement('div');
            splitDiv.className = 'split-container';
            const leftTab = tabs.find(t => t.id === leftTabId) || tabs[0];
            const rightTab = tabs.find(t => t.id === rightTabId) || (tabs[1] || tabs[0]);
            splitDiv.appendChild(createSplitPanel(leftTab, 'left'));
            splitDiv.appendChild(createSplitPanel(rightTab, 'right'));
            editorArea.appendChild(splitDiv);
        }
        container.appendChild(editorArea);
        updateStats();
        updateWindowTitle();
        updateViewMenu();
    }
    
    function createSplitPanel(tab, side) {
        const containerDiv = document.createElement('div');
        containerDiv.className = 'split-tab-panel';
        
        const actionDiv = document.createElement('div');
        actionDiv.className = 'panel-actions';
        const picker = document.createElement('div');
        picker.className = 'panel-tab-picker';
        picker.innerHTML = '⋯';
        actionDiv.appendChild(picker);
        
        const menuDiv = document.createElement('div');
        menuDiv.className = 'panel-tab-menu';
        actionDiv.appendChild(menuDiv);
        
        function updateMenu() {
            menuDiv.innerHTML = '';
            for (let t of tabs) {
                const item = document.createElement('div');
                item.className = 'menu-item';
                item.innerText = t.name;
                item.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (side === 'left') leftTabId = t.id;
                    else rightTabId = t.id;
                    renderWorkspace();
                });
                menuDiv.appendChild(item);
            }
        }
        updateMenu();
        
        picker.addEventListener('click', (e) => {
            e.stopPropagation();
            const isVisible = menuDiv.style.display === 'block';
            document.querySelectorAll('.panel-tab-menu').forEach(m => m.style.display = 'none');
            menuDiv.style.display = isVisible ? 'none' : 'block';
        });
        
        containerDiv.appendChild(actionDiv);
        const editorDiv = createRichEditor(tab);
        containerDiv.appendChild(editorDiv);
        return containerDiv;
    }
    
    function createRichEditor(tab) {
        const editorDiv = document.createElement('div');
        editorDiv.className = 'rich-editor';
        editorDiv.contentEditable = 'true';
        editorDiv.innerHTML = tab.contentHTML || '';
        editorDiv.addEventListener('input', () => {
            tab.contentHTML = editorDiv.innerHTML;
            updateStats();
        });
        editorDiv.addEventListener('focus', () => {
            setFocusedTab(tab.id);
        });
        editorDiv.addEventListener('paste', (e) => {
            e.preventDefault();
            const text = (e.clipboardData || window.clipboardData).getData('text/plain');
            const cleanText = sanitizeToPlainText(text);
            document.execCommand('insertText', false, cleanText);
            tab.contentHTML = editorDiv.innerHTML;
            updateStats();
        });
        editorDiv.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            showContextMenu(e.clientX, e.clientY, editorDiv, tab);
        });
        return editorDiv;
    }
    
    function showContextMenu(x, y, editorDiv, tab) {
        const existing = document.querySelector('.context-menu');
        if (existing) existing.remove();
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        menu.innerHTML = `
            <div class="context-item" data-action="cut">Cut</div>
            <div class="context-item" data-action="copy">Copy</div>
            <div class="context-item" data-action="paste">Paste & Match Style</div>
            <div class="divider"></div>
            <div class="context-item" data-action="selectAll">Select All</div>
            <div class="context-item" data-action="clear">Clear</div>
        `;
        menu.style.left = x + 'px';
        menu.style.top = y + 'px';
        document.body.appendChild(menu);
        
        const cut = menu.querySelector('[data-action="cut"]');
        cut.onclick = () => { document.execCommand('cut'); menu.remove(); };
        const copy = menu.querySelector('[data-action="copy"]');
        copy.onclick = () => { document.execCommand('copy'); menu.remove(); };
        const paste = menu.querySelector('[data-action="paste"]');
        paste.onclick = async () => {
            let text = await navigator.clipboard.readText();
            text = sanitizeToPlainText(text);
            editorDiv.focus();
            document.execCommand('insertText', false, text);
            tab.contentHTML = editorDiv.innerHTML;
            updateStats();
            menu.remove();
        };
        const selectAll = menu.querySelector('[data-action="selectAll"]');
        selectAll.onclick = () => { document.execCommand('selectAll'); menu.remove(); };
        const clear = menu.querySelector('[data-action="clear"]');
        clear.onclick = () => { editorDiv.innerHTML = ''; tab.contentHTML = ''; updateStats(); menu.remove(); };
        
        window.addEventListener('click', () => menu.remove(), { once: true });
    }
    
    // ========== SPLIT CONTROL ==========
    function enableSplit() {
        if (!isTabMode) return;
        if (tabs.length < 2) addTab('Untitled', '');
        if (!isSplit) {
            const current = tabs.find(t => t.id === focusedTabId) || tabs[0];
            let other = tabs.find(t => t.id !== current.id);
            if (!other && tabs.length >= 2) other = tabs[1];
            if (!other && tabs.length === 1) other = addTab('Untitled', '', false);
            leftTabId = current.id;
            rightTabId = other.id;
            isSplit = true;
            renderWorkspace();
        }
    }
    
    function disableSplit() {
        if (isSplit) {
            isSplit = false;
            leftTabId = null;
            rightTabId = null;
            if (!focusedTabId && tabs.length) focusedTabId = tabs[0].id;
            renderWorkspace();
        }
    }
    
    // ========== MENU VIEW ==========
    function updateViewMenu() {
        const viewDropdown = document.getElementById('viewDropdown');
        viewDropdown.innerHTML = '';
        const statusItem = document.createElement('div');
        statusItem.className = 'dropdown-item';
        statusItem.innerText = statusBarVisible ? 'Hide Status Bar' : 'Show Status Bar';
        statusItem.addEventListener('click', () => {
            statusBarVisible = !statusBarVisible;
            document.getElementById('statusBar').style.display = statusBarVisible ? 'flex' : 'none';
            updateViewMenu();
        });
        viewDropdown.appendChild(statusItem);
        viewDropdown.appendChild(document.createElement('div')).className = 'divider';
        const tabModeItem = document.createElement('div');
        tabModeItem.className = 'dropdown-item';
        tabModeItem.innerText = isTabMode ? 'Disable Tabs' : 'Enable Tabs';
        tabModeItem.addEventListener('click', () => {
            isTabMode = !isTabMode;
            if (!isTabMode) {
                const activeDoc = tabs.find(t => t.id === focusedTabId) || tabs[0];
                if (activeDoc) {
                    tabs = [activeDoc];
                    focusedTabId = activeDoc.id;
                }
                isSplit = false;
                leftTabId = null; rightTabId = null;
            } else {
                if (tabs.length === 0) addTab('Untitled', '');
                if (!focusedTabId && tabs.length) focusedTabId = tabs[0].id;
            }
            renderWorkspace();
            updateViewMenu();
        });
        viewDropdown.appendChild(tabModeItem);
        if (isTabMode && tabs.length >= 2) {
            const splitItem = document.createElement('div');
            splitItem.className = 'dropdown-item';
            splitItem.innerText = isSplit ? 'Disable Split View' : 'Enable Split View';
            splitItem.addEventListener('click', () => {
                if (isSplit) disableSplit();
                else enableSplit();
                updateViewMenu();
            });
            viewDropdown.appendChild(splitItem);
        }
    }
    
    // ========== RIBBON COMMANDS ==========
    function applyCommandToFocusedEditor(cmd, value = null) {
        let editorDiv = null;
        if (!isTabMode) {
            editorDiv = document.querySelector('.rich-editor');
        } else if (!isSplit) {
            editorDiv = document.querySelector('.rich-editor');
        } else {
            const focused = document.activeElement;
            if (focused && focused.classList && focused.classList.contains('rich-editor')) {
                editorDiv = focused;
            } else {
                editorDiv = document.querySelector('.rich-editor');
            }
        }
        if (!editorDiv) return;
        editorDiv.focus();
        if (cmd === 'removeFormat') {
            document.execCommand('removeFormat', false, null);
        } else if (cmd === 'bold' || cmd === 'italic') {
            document.execCommand(cmd, false, null);
        } else if (cmd === 'justifyLeft' || cmd === 'justifyCenter' || cmd === 'justifyRight' || cmd === 'justifyFull') {
            document.execCommand(cmd, false, null);
        } else if (cmd === 'insertUnorderedList' || cmd === 'insertOrderedList') {
            document.execCommand(cmd, false, null);
        }
        const tabId = focusedTabId;
        if (tabId) {
            const tab = tabs.find(t => t.id === tabId);
            if (tab) tab.contentHTML = editorDiv.innerHTML;
        }
        updateStats();
        // Refresh toolbar active state (optional)
    }
    
    function bindToolbar() {
        const btns = document.querySelectorAll('.tool-btn');
        btns.forEach(btn => {
            btn.removeEventListener('click', toolbarHandler);
            btn.addEventListener('click', toolbarHandler);
            // juga untuk sentuh
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); btn.click(); }, { passive: false });
        });
    }
    function toolbarHandler(e) {
        const cmd = this.getAttribute('data-cmd');
        if (cmd) applyCommandToFocusedEditor(cmd);
    }
    
    // ========== INIT ==========
    const initialHTML = '<div>Selamat datang di TextEdit macOS Tahoe.<br><br>Fitur ribbon: Plain, Bold, Italic, Alignment, List (bullet & numbering).<br>List sekarang tidak menabrak margin.<br>Responsif untuk semua layar.<br>Context menu lengkap.</div>';
    const initialTab = createTab('Untitled', initialHTML);
    tabs.push(initialTab);
    focusedTabId = initialTab.id;
    isTabMode = true;
    isSplit = false;
    statusBarVisible = true;
    renderWorkspace();
    bindToolbar();
    
    // ========== MENU HANDLERS ==========
    document.getElementById('newDocFile').addEventListener('click', () => {
        if (isTabMode) addTab('Untitled', '');
        else {
            const newDoc = createTab('Untitled', '');
            tabs = [newDoc];
            focusedTabId = newDoc.id;
            renderWorkspace();
        }
    });
    document.getElementById('openDocFile').addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.html,.txt,.md';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                let content = ev.target.result;
                if (file.name.endsWith('.txt')) content = `<pre>${sanitizeToPlainText(content)}</pre>`;
                if (isTabMode) addTab(file.name, content);
                else {
                    const newDoc = createTab(file.name, content);
                    tabs = [newDoc];
                    focusedTabId = newDoc.id;
                    renderWorkspace();
                }
            };
            reader.readAsText(file);
        };
        input.click();
    });
    document.getElementById('saveDocFile').addEventListener('click', () => {
        let tab = null;
        if (!isTabMode) tab = tabs[0];
        else if (!isSplit) tab = tabs.find(t => t.id === focusedTabId);
        else tab = tabs.find(t => t.id === leftTabId);
        if (tab) {
            const blob = new Blob([tab.contentHTML], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = tab.name.endsWith('.html') ? tab.name : tab.name + '.html';
            a.click();
            URL.revokeObjectURL(a.href);
        }
    });
    document.getElementById('saveAsFile').addEventListener('click', () => {
        let tab = null;
        if (!isTabMode) tab = tabs[0];
        else if (!isSplit) tab = tabs.find(t => t.id === focusedTabId);
        else tab = tabs.find(t => t.id === leftTabId);
        if (tab) {
            const name = prompt('Save as:', tab.name);
            if (name) {
                const blob = new Blob([tab.contentHTML], {type: 'text/html'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = name.endsWith('.html') ? name : name + '.html';
                a.click();
                URL.revokeObjectURL(a.href);
            }
        }
    });
    document.getElementById('renameFile').addEventListener('click', () => {
        let tab = null;
        if (!isTabMode) tab = tabs[0];
        else if (!isSplit) tab = tabs.find(t => t.id === focusedTabId);
        else tab = tabs.find(t => t.id === leftTabId);
        if (tab) {
            const newName = prompt('Rename document:', tab.name);
            if (newName) renameTab(tab.id, newName);
        }
    });
    document.getElementById('moveToFile').addEventListener('click', () => alert('Move To: simulasi'));
    document.getElementById('closeWindowFile').addEventListener('click', () => alert('Tutup tab browser'));
    document.getElementById('editUndo').addEventListener('click', () => document.execCommand('undo'));
    document.getElementById('editRedo').addEventListener('click', () => document.execCommand('redo'));
    document.getElementById('editCut').addEventListener('click', () => document.execCommand('cut'));
    document.getElementById('editCopy').addEventListener('click', () => document.execCommand('copy'));
    document.getElementById('editPaste').addEventListener('click', async () => {
        const text = await navigator.clipboard.readText();
        const clean = sanitizeToPlainText(text);
        document.execCommand('insertText', false, clean);
    });
    document.getElementById('pasteMatchStyle').addEventListener('click', async () => {
        const text = await navigator.clipboard.readText();
        const clean = sanitizeToPlainText(text);
        document.execCommand('insertText', false, clean);
    });
    document.getElementById('selectAll').addEventListener('click', () => document.execCommand('selectAll'));
    document.getElementById('makePlainText').addEventListener('click', () => {
        let tab = null;
        if (!isTabMode) tab = tabs[0];
        else if (!isSplit) tab = tabs.find(t => t.id === focusedTabId);
        else tab = tabs.find(t => t.id === leftTabId);
        if (tab) {
            const plain = sanitizeToPlainText(tab.contentHTML);
            tab.contentHTML = `<pre>${plain}</pre>`;
            renderWorkspace();
        }
    });
    let wrap = true;
    document.getElementById('toggleWrapLines').addEventListener('click', () => {
        wrap = !wrap;
        document.querySelectorAll('.rich-editor').forEach(el => el.style.whiteSpace = wrap ? 'pre-wrap' : 'pre');
    });
    let fontSize = 14;
    document.getElementById('fontBigger').addEventListener('click', () => {
        fontSize = Math.min(28, fontSize+2);
        document.querySelectorAll('.rich-editor').forEach(el => el.style.fontSize = fontSize+'px');
    });
    document.getElementById('fontSmaller').addEventListener('click', () => {
        fontSize = Math.max(10, fontSize-2);
        document.querySelectorAll('.rich-editor').forEach(el => el.style.fontSize = fontSize+'px');
    });
    document.getElementById('aboutApp').addEventListener('click', () => alert('TextEdit macOS Tahoe\nResponsif & List fixed'));
    document.getElementById('quitApp').addEventListener('click', () => alert('Tutup browser tab'));
    document.getElementById('minimizeWindow').addEventListener('click', () => alert('Minimize simulasi'));
    document.getElementById('zoomWindow').addEventListener('click', () => { if (document.fullscreenEnabled) document.documentElement.requestFullscreen(); });
    document.getElementById('helpSearch').addEventListener('click', () => alert('Gunakan ribbon & context menu.'));
    
    // Periodic stats update
    setInterval(() => updateStats(), 500);
</script>
</body>
