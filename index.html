<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>TextEdit — AjarinWeb</title>
    <style>
		:root {
			--bg-color: rgba(14,14,24,0.45);
			--highlight: rgba(14, 14, 24, 0.75);
		}
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1c1c1e;
            font-family: -apple-system, 'SF Pro Text', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100dvh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: pan-x pan-y;
        }
		
		.glass-container { position: relative; display: flex; align-items: center; background: transparent; border-radius: 2rem; overflow: hidden; flex: 1 1 auto; box-shadow: 0 6px 6px rgba(0, 0, 0, 0.2), 0 0 20px rgba(0, 0, 0, 0.1); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 2.2); }
		.glass-filter, .glass-overlay, .glass-specular { position: absolute; inset: 0; border-radius: inherit; }
		.glass-filter { z-index: 0; backdrop-filter: blur(4px); filter: url(#lensFilter) saturate(120%) brightness(1.15); pointer-events: none; }
		.glass-overlay { z-index: 1; background: var(--bg-color); }
		.glass-specular { z-index: 2; box-shadow: inset 1px 1px 0 var(--highlight), inset 0 0 5px var(--highlight); }
		
        /* GLOBAL MENU BAR */
        .global-menu-bar {
            background: rgba(30,30,34,0.75);
            border-bottom: 0.5px solid rgba(255,255,255,0.15);
            padding: 8px 16px;
            display: flex;
            gap: 12px;
            font-size: clamp(12px, 3vw, 13px);
            font-weight: 500;
            color: #e8e8ef;
            flex-shrink: 0;
            flex-wrap: nowrap;
            white-space: nowrap;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            z-index: 100;
        }
        .global-menu-bar::-webkit-scrollbar, .toolbar::-webkit-scrollbar, .tab-bar::-webkit-scrollbar {
            display: none;
        }
        .menu-item {
            position: relative;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: default;
            transition: 0.1s;
            flex-shrink: 0;
        }
        .menu-item:hover { background: rgba(100,110,140,0.5); }
        .dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            background: transparent;
			border: none;
            border-radius: 18px;
            padding: 8px 0;
            min-width: 180px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-6px);
            transition: opacity 0.12s ease, transform 0.12s ease;
            pointer-events: none;
            z-index: 10000;
            box-shadow:
				0 24px 56px rgba(0,0,0,0.65),
				inset 0 1px 0 rgba(255,255,255,0.28),
				inset 0 -0.5px 0 rgba(0,0,0,0.35);
		}
		.dropdown::before {
			content: '';
			position: absolute; top: 0; left: 0; right: 0; height: 1px;
			background: linear-gradient(90deg, transparent 5%, rgba(255,255,255,0.5) 50%, transparent 95%);
			pointer-events: none; z-index: 1;
		}
		.dropdown::after {
			content: '';
			position: absolute; inset: 0;
			background: linear-gradient(160deg, rgba(255,255,255,0.04) 0%, transparent 60%);
			pointer-events: none;
		}
        .dropdown.show {
			opacity: 1;
			visibility: visible;
			transform: translateY(0);
			pointer-events: auto;
			transition: opacity 0.18s cubic-bezier(.22,1,.36,1), transform 0.22s cubic-bezier(.22,1,.36,1);
		}
		.dropdown .dropdown-item {
			position: relative;
			z-index: 3;
			background: transparent;
		}
        .dropdown-item {
            padding: 8px 16px;
            font-size: 13px;
            color: #f0f0f5;
            display: flex;
            justify-content: space-between;
            cursor: default;
            transition: 0.08s;
        }
        .dropdown-item:hover { background: #2c6eb0; }
        .divider { height: 1px; background: rgba(255,255,255,0.15); margin: 6px 12px; }
        .shortcut-hint { font-size: 11px; color: #9a9aa5; font-family: monospace; }
        
        /* JENDELA WORKSPACE */
        .window-workspace {
            flex: 1;
            min-height: 0;
            margin: 12px 16px 16px;
            background: rgba(28,28,32,0.75);
            backdrop-filter: blur(28px);
            border-radius: 16px;
            border: 0.5px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .window-header {
            background: rgba(36,36,40,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }
        .title-bar {
            padding: 12px 16px 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .traffic-lights {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .traffic {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }
        .window-title {
            font-size: clamp(12px, 4vw, 13px);
            font-weight: 600;
            color: #e0e0e8;
            text-align: center;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 48px;
        }
        .toolbar {
            padding: 8px 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: nowrap;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            border-top: 0.5px solid rgba(255,255,255,0.05);
        }
        .tool-group {
            display: flex;
            gap: 4px;
            background: rgba(0,0,0,0.3);
            padding: 4px 6px;
            border-radius: 32px;
            border: 0.3px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
			position: relative;
			isolation: isolate;
        }
		.tool-group::before {
			content: '';
			position: absolute; inset: 0;
			border-radius: 32px;
			background: rgba(255,255,255,0.07);
			border: 0.5px solid rgba(255,255,255,0.2);
			border-bottom-color: rgba(255,255,255,0.07);
			box-shadow: 0 4px 14px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
			pointer-events: none;
		}
		.tool-group::after {
			content: '';
			position: absolute; top: 0; left: 6px; right: 6px; height: 45%;
			border-radius: 28px 28px 20px 20px;
			background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 100%);
			pointer-events: none;
		}
        .tool-btn {
            background: transparent;
            border: none;
            color: #dddde6;
            font-size: clamp(11px, 3vw, 13px);
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 28px;
            cursor: pointer;
            transition: 0.1s;
            font-family: inherit;
            white-space: nowrap;
            touch-action: manipulation;
        }
        .tool-btn:active { background: rgba(100,110,140,0.8); transform: scale(0.96); }
        .tool-btn:hover { background: rgba(100,110,140,0.6); }
        .tool-btn.active { background: #2c6eb0; color: white; }
        .separator {
            width: 1px;
            height: 28px;
            background: rgba(255,255,255,0.2);
            margin: 0 4px;
            flex-shrink: 0;
        }
		
		.context-item,
		.dropdown-item {
			display: flex;
			align-items: center;
			gap: 8px;
			padding: 8px 16px;
		}
		.context-item svg,
		.dropdown-item svg {
			width: 13px;
			height: 13px;
			flex-shrink: 0;
			opacity: 0.85;
		}
		.shortcut-hint {
			margin-left: auto;
			font-size: 11px;
			color: rgba(160,160,180,0.7);
			font-family: monospace;
		}
        
        .workspace-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .tab-bar {
            background: rgba(28,28,32,0.6);
            backdrop-filter: blur(12px);
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 2px;
            padding: 6px 8px 0 8px;
            overflow-x: auto;
            flex-shrink: 0;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .tab {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(45,45,50,0.7);
            border-radius: 10px 10px 0 0;
            font-size: clamp(11px, 3vw, 12px);
            font-weight: 500;
            cursor: pointer;
            border: 0.5px solid rgba(255,255,255,0.1);
            border-bottom: none;
            flex-shrink: 0;
        }
        .tab.active { background: rgba(110,120,140,0.9); color: white; }
        .tab:active { background: rgba(90,90,100,0.8); }
        .tab-close {
            font-size: 14px;
            cursor: pointer;
            opacity: 0.7;
            padding: 0 4px;
        }
        .tab-close:active { opacity: 1; color: #ff5f56; }
        .new-tab-btn {
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 18px;
            cursor: pointer;
            padding: 0 12px;
            margin-left: 4px;
            font-weight: bold;
        }
        .new-tab-btn:active { color: white; }
        
        .editor-area {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .split-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            flex-direction: row;
        }
        
        @media (max-width: 768px) {
            .split-container {
                flex-direction: column;
            }
            .split-tab-panel {
                border-right: none !important;
                border-bottom: 0.5px solid rgba(255,255,255,0.1);
                min-height: 40%;
            }
        }
        .split-tab-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            border-right: 0.5px solid rgba(255,255,255,0.1);
        }
        .panel-actions {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 50;
        }
        .panel-tab-picker {
            width: 32px;
            height: 32px;
            background: rgba(60,60,70,0.85);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            color: #ddd;
            border: 0.5px solid rgba(255,255,255,0.2);
            transition: 0.1s;
            touch-action: manipulation;
        }
        .panel-tab-picker:active { background: rgba(100,110,140,0.9); }
        .panel-tab-menu {
            position: absolute;
            top: 36px;
            right: 0;
            background: rgba(28,28,32,0.96);
            backdrop-filter: blur(40px);
            border: 0.5px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            min-width: 140px;
            z-index: 300;
            display: none;
        }
        .panel-tab-menu .menu-item {
            padding: 10px 16px;
            font-size: 13px;
            color: #f0f0f5;
            cursor: pointer;
        }
        .panel-tab-menu .menu-item:active { background: #2c6eb0; }
        
        .rich-editor {
            flex: 1;
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #f0f0f8;
            font-family: 'SF Mono', 'JetBrains Mono', 'Menlo', monospace;
            font-size: 14px;
            line-height: 1.5;
            padding: 16px 20px;
            overflow: auto;
            cursor: text;
            word-wrap: break-word;
        }
		.rich-editor pre {
            white-space: inherit;
            font-family: inherit;
            margin: 0;
        }
        .rich-editor ul,
        .rich-editor ol {
            margin: 0.5em 0;
            padding-left: 1.8em;
            list-style-position: outside;
        }
        .rich-editor li {
            margin: 0.2em 0;
            line-height: 1.4;
        }
        .rich-editor ul ul,
        .rich-editor ol ul,
        .rich-editor ul ol,
        .rich-editor ol ol {
            margin-left: 1.2em;
        }
        .rich-editor:focus { outline: none; }
        
        .status-bar {
            padding: 6px 16px;
            background: rgba(24,24,28,0.6);
            backdrop-filter: blur(12px);
            border-top: 0.5px solid rgba(255,255,255,0.08);
            font-size: 10px;
            color: #9a9aa5;
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(150,160,180,0.5); border-radius: 10px; }
        
        .context-menu {
            position: fixed;
            background: rgba(14,14,24,0.45);
            backdrop-filter: blur(52px) saturate(220%);
            border-radius: 14px;
            border: 0.5px solid rgba(255,255,255,0.22);
            padding: 6px 0;
            min-width: 160px;
            z-index: 10000;
            box-shadow: 0 24px 56px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.28);
            animation: fadeIn 0.08s ease;
			overflow: hidden;
        }
		.context-menu::before {
			content: '';
			position: absolute; top: 0; left: 0; right: 0; height: 1px;
			background: linear-gradient(90deg, transparent 5%, rgba(255,255,255,0.5) 50%, transparent 95%);
			pointer-events: none; z-index: 1;
		}
        @keyframes fadeIn { from { opacity:0; transform:scale(0.96); } to { opacity:1; transform:scale(1); } }
        .context-item {
            padding: 10px 18px;
            font-size: 14px;
			color: #f0f0f5;
            cursor: pointer;
            touch-action: manipulation;
        }
		.context-item:hover { background: #2c6eb0; }
        .context-item:active { background: #2c6eb0; }
        
        @media (max-width: 480px) {
            .window-workspace {
                margin: 8px;
            }
            .rich-editor {
                padding: 12px;
                font-size: 13px;
            }
            .tool-btn {
                padding: 6px 10px;
            }
            .tab {
                padding: 4px 8px;
            }
        }
		
		.mac-modal-overlay {
			position: fixed;
			top: 0; left: 0; right: 0; bottom: 0;
			background: rgba(0, 0, 0, 0.4);
			display: none;
			justify-content: center;
			align-items: flex-start;
			padding-top: 15vh;
			z-index: 20000;
			animation: fadeIn 0.15s ease;
		}
		.mac-modal {
			background: rgba(16,16,26,0.55);
			backdrop-filter: blur(56px) saturate(200%);
			-webkit-backdrop-filter: blur(56px) saturate(200%);
			border: 0.5px solid rgba(255,255,255,0.24);
			border-radius: 20px;
			width: 360px;
			max-width: 90vw;
			padding: 20px;
			box-shadow: 0 40px 80px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.3);
			color: #e8e8ef;
			font-size: 13px;
			display: flex;
			flex-direction: column;
			gap: 16px;
		}
		.mac-modal-row {
			display: flex;
			align-items: center;
			gap: 12px;
		}
		.mac-modal-row label {
			width: 65px;
			text-align: right;
			color: #ddd;
		}
		.mac-modal-row input, .mac-modal-row select {
			flex: 1;
			background: rgba(0, 0, 0, 0.3);
			border: 1px solid rgba(255,255,255,0.15);
			color: #fff;
			padding: 6px 10px;
			border-radius: 6px;
			font-family: inherit;
			font-size: 13px;
			outline: none;
			transition: 0.2s;
		}
		.mac-modal-row input:focus, .mac-modal-row select:focus {
			border-color: #007aff;
			box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.3);
		}
		.mac-modal-actions {
			display: flex;
			justify-content: flex-end;
			gap: 10px;
			margin-top: 8px;
		}
		.mac-modal-actions button {
			background: rgba(255, 255, 255, 0.1);
			border: 0.5px solid rgba(255,255,255,0.1);
			color: white;
			padding: 6px 16px;
			border-radius: 6px;
			font-size: 13px;
			cursor: pointer;
			font-family: inherit;
		}
		.mac-modal-actions button.primary {
			background: #007aff;
			border-color: #007aff;
			font-weight: 500;
		}
		.mac-modal-actions button:active { opacity: 0.8; }
		
		/* --- ANIMASI MORPHING FORMAT --- */
        .format-wrapper {
            flex: 1;
            display: grid;
            grid-template-areas: "stack";
            align-items: center;
            overflow: hidden; /* Mencegah elemen keluar batas saat meluncur */
            border-radius: 6px;
        }
        
        /* Membuat Select dan Input menempati titik koordinat yang sama persis */
        .format-wrapper > * {
            grid-area: stack;
            /* Kurva transisi khas gaya Apple (cepat di awal, memantul halus di akhir) */
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15); 
        }

        /* State 1: Dropdown Tampil (Default) */
        #saveFormatSelect {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }
        .custom-ext-container {
            opacity: 0;
            transform: translateX(20px);
            pointer-events: none;
            display: flex;
            gap: 6px;
        }

        /* State 2: Kolom Kustom Tampil (Class .is-custom aktif) */
        .format-wrapper.is-custom #saveFormatSelect {
            opacity: 0;
            transform: translateX(-20px);
            pointer-events: none;
        }
        .format-wrapper.is-custom .custom-ext-container {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        /* Tombol Kembali (X) */
        .custom-ext-container input {
            width: 100%;
        }
        .revert-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #aaa;
            border-radius: 6px;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
            padding: 0;
            font-size: 14px;
        }
        .revert-btn:hover {
            background: rgba(255, 59, 48, 0.5); /* Merah gaya Apple */
            color: white;
            border-color: rgba(255, 59, 48, 0.8);
        }
    </style>
</head>
<body>
<div class="global-menu-bar">
	<div class="menu-item">TextEdit
		<div class="dropdown">
			<div class="dropdown-item" id="aboutApp">About</div><div class="divider"></div>
			<div class="dropdown-item" id="quitApp">Quit</div>
		</div>
	</div>
	<div class="menu-item">File
		<div class="dropdown">
			<div class="dropdown-item" id="newDocFile">New <span class="shortcut-hint">⌘N</span></div>
			<div class="dropdown-item" id="openDocFile">Open... <span class="shortcut-hint">⌘O</span></div>
			<div class="dropdown-item" id="saveDocFile">Save <span class="shortcut-hint">⌘S</span></div>
			<div class="dropdown-item" id="saveAsFile">Save As...</div><div class="divider"></div>
			<div class="dropdown-item" id="renameFile">Rename...</div>
			<div class="dropdown-item" id="moveToFile">Move To...</div><div class="divider"></div>
			<div class="dropdown-item" id="closeWindowFile">Close</div>
		</div>
	</div>
	<div class="menu-item">Edit
		<div class="dropdown">
			<div class="dropdown-item" id="editUndo"><svg  xmlns="http://www.w3.org/2000/svg" viewBox="2 2 20 20" fill="currentColor" style="width:1em;height:1em;display:block;pointer-events:none;"><path d="M9 10h6c2.21 0 4 1.79 4 4s-1.79 4-4 4h-3v2h3c3.31 0 6-2.69 6-6s-2.69-6-6-6H9V4L3 9l6 5z"></path></svg> Undo <span class="shortcut-hint">⌘Z</span></div>
			<div class="dropdown-item" id="editRedo"><svg  xmlns="http://www.w3.org/2000/svg" viewBox="2 2 20 20" fill="currentColor" style="width:1em;height:1em;display:block;pointer-events:none;"><path d="M9 20h3v-2H9c-2.21 0-4-1.79-4-4s1.79-4 4-4h6v4l6-5-6-5v4H9c-3.31 0-6 2.69-6 6s2.69 6 6 6"></path></svg> Redo <span class="shortcut-hint">⇧⌘Z</span></div><div class="divider"></div>
			<div class="dropdown-item" id="editCut"><svg xmlns="http://www.w3.org/2000/svg" viewBox="2 2 20 20" fill="currentColor" style="width:1em;height:1em;display:block;pointer-events:none;"><path d="M10 6.5C10 4.57 8.43 3 6.5 3S3 4.57 3 6.5 4.57 10 6.5 10c.6 0 1.16-.17 1.65-.43L10.58 12l-2.43 2.43C7.66 14.16 7.1 14 6.5 14 4.57 14 3 15.57 3 17.5S4.57 21 6.5 21s3.5-1.57 3.5-3.5c0-.6-.17-1.16-.43-1.65L12 13.42l6.59 6.59h2.83L9.57 8.16c.27-.49.43-1.05.43-1.65ZM6.5 19c-.83 0-1.5-.67-1.5-1.5S5.67 16 6.5 16s1.5.67 1.5 1.5S7.33 19 6.5 19M5 6.5C5 5.67 5.67 5 6.5 5S8 5.67 8 6.5 7.33 8 6.5 8 5 7.33 5 6.5m8.4 2.69 1.41 1.41 6.6-6.6h-2.82z"></path></svg> Cut <span class="shortcut-hint">⌘X</span></div>

<script>
// ========== UTILITIES ==========
function sanitizeToPlainText(html) {
    const div = document.createElement('div');
    div.innerHTML = html;
    return div.innerText;
}

// ========== DATA MODEL ==========
let tabs = [];
let nextId = 1;
let focusedTabId = null;
let isTabMode = true;
let isSplit = false;
let leftTabId = null;
let rightTabId = null;
let statusBarVisible = true;
let isWrapLines = true;

function createTab(name, contentHTML) {
    return { id: nextId++, name: name || 'Untitled', contentHTML: contentHTML || '' };
}
function addTab(name, contentHTML, setFocus = true) {
    const newTab = createTab(name, contentHTML);
    tabs.push(newTab);
    if (setFocus) focusedTabId = newTab.id;
    if (isSplit && tabs.length < 2) disableSplit();
    renderWorkspace();
    return newTab;
}
function closeTab(tabId) {
    if (tabs.length <= 1) return;
    const idx = tabs.findIndex(t => t.id === tabId);
    if (idx !== -1) tabs.splice(idx, 1);
    if (focusedTabId === tabId) focusedTabId = tabs[0]?.id || null;
    if (leftTabId === tabId) leftTabId = null;
    if (rightTabId === tabId) rightTabId = null;
    if (isSplit && tabs.length < 2) disableSplit();
    if (isSplit) {
        if (!leftTabId) leftTabId = tabs[0]?.id;
        if (!rightTabId) rightTabId = tabs[1]?.id || (tabs.length > 1 ? tabs[1].id : tabs[0]?.id);
    }
    renderWorkspace();
}
function setFocusedTab(tabId) {
    if (focusedTabId === tabId) return;
    focusedTabId = tabId;
    updateWindowTitle();
    document.querySelectorAll('.tab').forEach(tabEl => {
        const closeBtn = tabEl.querySelector('.tab-close');
        if (closeBtn && parseInt(closeBtn.getAttribute('data-id')) === tabId) {
            tabEl.classList.add('active');
        } else {
            tabEl.classList.remove('active');
        }
    });
}
function renameTab(tabId, newName) {
    const tab = tabs.find(t => t.id === tabId);
    if (tab) tab.name = newName;
    renderWorkspace();
    updateWindowTitle();
}
function updateTabContent(tabId, html) {
    const tab = tabs.find(t => t.id === tabId);
    if (tab) tab.contentHTML = html;
    updateStats();
}
function updateWindowTitle() {
    if (!isTabMode) {
        const doc = tabs[0];
        document.getElementById('windowTitle').innerText = doc ? doc.name : 'TextEdit';
    } else if (focusedTabId) {
        const tab = tabs.find(t => t.id === focusedTabId);
        document.getElementById('windowTitle').innerText = tab ? tab.name : 'Untitled';
    } else {
        document.getElementById('windowTitle').innerText = 'TextEdit';
    }
}
function updateStats() {
    let activeHTML = '';
    if (!isTabMode) {
        if (tabs[0]) activeHTML = tabs[0].contentHTML;
    } else if (focusedTabId) {
        const tab = tabs.find(t => t.id === focusedTabId);
        if (tab) activeHTML = tab.contentHTML;
    }
    const text = sanitizeToPlainText(activeHTML);
    const chars = text.length;
    const lines = text.split(/\r?\n/).length;
    document.getElementById('stats').innerText = `${chars} karakter, ${lines} baris`;
    const modeBadge = document.getElementById('modeBadge');
    if (modeBadge) {
        const hasPre = /<pre[^>]*>/i.test(activeHTML);
        const testHtml = activeHTML.replace(/<br\s*\/?>/gi, '').replace(/<\/?div>/gi, '').trim();
        const hasRichFormat = /<(b|i|u|ul|ol|li|span|p)[^>]*>/i.test(testHtml);
        if (hasPre) modeBadge.innerText = 'Plain Text';
        else if (hasRichFormat) modeBadge.innerText = 'Rich Text';
        else modeBadge.innerText = 'Plain Text';
    }
}

// ========== RENDER ==========
function renderWorkspace() {
    const container = document.getElementById('workspaceContent');
    container.innerHTML = '';
    if (isTabMode) {
        const tabBar = document.createElement('div');
        tabBar.className = 'tab-bar';
        for (let tab of tabs) {
            const tabDiv = document.createElement('div');
            tabDiv.className = `tab ${focusedTabId === tab.id ? 'active' : ''}`;
            tabDiv.innerHTML = `<span>${tab.name}</span><span class="tab-close" data-id="${tab.id}">✕</span>`;
            tabDiv.addEventListener('click', (e) => {
                if (!e.target.classList.contains('tab-close')) {
                    if (!isSplit) {
                        setFocusedTab(tab.id);
                        renderWorkspace();
                    } else {
                        setFocusedTab(tab.id);
                    }
                }
            });
            tabDiv.querySelector('.tab-close').addEventListener('click', (e) => { e.stopPropagation(); closeTab(tab.id); });
            tabBar.appendChild(tabDiv);
        }
        const newBtn = document.createElement('button');
        newBtn.textContent = '+';
        newBtn.className = 'new-tab-btn';
        newBtn.addEventListener('click', () => addTab('Untitled', ''));
        tabBar.appendChild(newBtn);
        container.appendChild(tabBar);
    }
    const editorArea = document.createElement('div');
    editorArea.className = 'editor-area';
    if (!isTabMode) {
        const doc = tabs[0];
        if (doc) editorArea.appendChild(createRichEditor(doc));
    } else if (!isSplit) {
        const current = tabs.find(t => t.id === focusedTabId) || tabs[0];
        if (current) editorArea.appendChild(createRichEditor(current));
    } else {
        const splitDiv = document.createElement('div');
        splitDiv.className = 'split-container';
        const leftTab = tabs.find(t => t.id === leftTabId) || tabs[0];
        const rightTab = tabs.find(t => t.id === rightTabId) || (tabs[1] || tabs[0]);
        splitDiv.appendChild(createSplitPanel(leftTab, 'left'));
        splitDiv.appendChild(createSplitPanel(rightTab, 'right'));
        editorArea.appendChild(splitDiv);
    }
    container.appendChild(editorArea);
    updateStats();
    updateWindowTitle();
    updateViewMenu();
	
	
    document.querySelectorAll('.panel-tab-picker').forEach(pickerBtn => {
        applyLiquidGlassToElement(pickerBtn, {
        radius: 16,       // Karena ukuran tombolnya 32x32px bulat sempurna
        bezelWidth: 8,    // Bezel kecil karena area tombol kecil
        glassThickness: 40,
        refractiveIndex: 1.5
        });
    });
    
}
function createSplitPanel(tab, side) {
    const containerDiv = document.createElement('div');
    containerDiv.className = 'split-tab-panel';
    const actionDiv = document.createElement('div');
    actionDiv.className = 'panel-actions';
    const picker = document.createElement('div');
    picker.className = 'panel-tab-picker';
    picker.innerHTML = '⋯';
    actionDiv.appendChild(picker);
    const menuDiv = document.createElement('div');
    menuDiv.className = 'panel-tab-menu';
    actionDiv.appendChild(menuDiv);
    function updateMenu() {
        menuDiv.innerHTML = '';
        for (let t of tabs) {
            const item = document.createElement('div');
            item.className = 'menu-item';
            item.innerText = t.name;
            item.addEventListener('click', (e) => {
                e.stopPropagation();
                if (side === 'left') leftTabId = t.id;
                else rightTabId = t.id;
                renderWorkspace();
            });
            menuDiv.appendChild(item);
        }
    }
    updateMenu();
    picker.addEventListener('click', (e) => {
        e.stopPropagation();
        const isVisible = menuDiv.style.display === 'block';
        document.querySelectorAll('.panel-tab-menu').forEach(m => m.style.display = 'none');
        menuDiv.style.display = isVisible ? 'none' : 'block';
		
		
        applyLiquidGlassToElement(menuDiv, {
            radius: 12,        // Sesuai dengan CSS border-radius
            bezelWidth: 16,
            glassThickness: 80,
            refractiveIndex: 1.6
        });
        
    });
    containerDiv.appendChild(actionDiv);
    const editorDiv = createRichEditor(tab);
    containerDiv.appendChild(editorDiv);
    return containerDiv;
}
function createRichEditor(tab) {
    const editorDiv = document.createElement('div');
    editorDiv.className = 'rich-editor';
    editorDiv.contentEditable = 'true';
    editorDiv.style.whiteSpace = isWrapLines ? 'pre-wrap' : 'pre';
    editorDiv.innerHTML = tab.contentHTML || '';
    editorDiv.addEventListener('input', () => {
        tab.contentHTML = editorDiv.innerHTML;
        updateStats();
    });
    editorDiv.addEventListener('focus', () => {
        setFocusedTab(tab.id);
    });
    editorDiv.addEventListener('paste', (e) => {
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData('text/plain');
        const cleanText = sanitizeToPlainText(text);
        document.execCommand('insertText', false, cleanText);
        tab.contentHTML = editorDiv.innerHTML;
        updateStats();
    });
    editorDiv.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        showContextMenu(e.clientX, e.clientY, editorDiv, tab);
    });
    return editorDiv;
}
function showContextMenu(x, y, editorDiv, tab) {
    const existing = document.querySelector('.context-menu');
    if (existing) existing.remove();
    let savedSelection = null;
    const sel = window.getSelection();
    if (sel && sel.rangeCount > 0) savedSelection = sel.getRangeAt(0).cloneRange();
    const menu = document.createElement('div');
    menu.className = 'context-menu';
    menu.innerHTML = `
        <div class="context-item" data-action="cut"><svg xmlns="http://www.w3.org/2000/svg" viewBox="2 2 20 20" fill="currentColor" style="width:1em;height:1em;display:block;pointer-events:none;"><path d="M10 6.5C10 4.57 8.43 3 6.5 3S3 4.57 3 6.5 4.57 10 6.5 10c.6 0 1.16-.17 1.65-.43L10.58 12l-2.43 2.43C7.66 14.16 7.1 14 6.5 14 4.57 14 3 15.57 3 17.5S4.57 21 6.5 21s3.5-1.57 3.5-3.5c0-.6-.17-1.16-.43-1.65L12 13.42l6.59 6.59h2.83L9.57 8.16c.27-.49.43-1.05.43-1.65ZM6.5 19c-.83 0-1.5-.67-1.5-1.5S5.67 16 6.5 16s1.5.67 1.5 1.5S7.33 19 6.5 19M5 6.5C5 5.67 5.67 5 6.5 5S8 5.67 8 6.5 7.33 8 6.5 8 5 7.33 5 6.5m8.4 2.69 1.41 1.41 6.6-6.6h-2.82z"></path></svg> Cut <span class="shortcut-hint">⌘X</span></div>

// ---------- LIQUID GLASS ENGINE ----------
const SurfaceEquations = { convex_squircle: (x) => Math.pow(1 - Math.pow(1 - x, 4), 1 / 4) };
class Spring { 
    constructor(v, s = 300, d = 20) { this.value = v; this.target = v; this.velocity = 0; this.stiffness = s; this.damping = d; } 
    setTarget(t) { this.target = t; } 
    update(dt) { const f = (this.target - this.value) * this.stiffness; const df = this.velocity * this.damping; this.velocity += (f - df) * dt; this.value += this.velocity * dt; return this.value; } 
    isSettled() { return Math.abs(this.target - this.value) < 0.001 && Math.abs(this.velocity) < 0.001; } 
}
function applySpringPress(selector) {
    document.querySelectorAll(selector).forEach(btn => {
        const ss = new Spring(1, 1800, 55);
        let pressed = false, raf = null;
        function loop() { const dt = Math.min(0.032,1/60); ss.setTarget(pressed?0.88:1); const sc = ss.update(dt); btn.style.transform = `scale(${sc})`; if (!ss.isSettled()) raf = requestAnimationFrame(loop); else raf = null; }
        btn.addEventListener('pointerdown', ()=>{ pressed=true; if(!raf) raf = requestAnimationFrame(loop); });
        btn.addEventListener('pointerup', ()=>{ pressed=false; if(!raf) raf = requestAnimationFrame(loop); });
        btn.addEventListener('pointerleave', ()=>{ pressed=false; if(!raf) raf = requestAnimationFrame(loop); });
    });
}

function buildDisplacementMap(width, height, radius, bezelWidth, glassThickness, refractiveIndex) {
    const w = width, h = height, rad = radius, bw = bezelWidth, gt = glassThickness, ri = refractiveIndex;
    const profile = [];
    const steps = 128;
    for (let i = 0; i <= steps; i++) {
        const x = i / steps;
        const y = SurfaceEquations.convex_squircle(x);
        const dx = x < 1 ? 0.0001 : -0.0001;
        const d = (SurfaceEquations.convex_squircle(Math.max(0, Math.min(1, x + dx))) - y) / dx;
        const m = Math.sqrt(d * d + 1);
        const n = [-d / m, -1 / m];
        const dt = n[1];
        const k = 1 - (1 / ri) ** 2 * (1 - dt * dt);
        if (k >= 0) {
            const rf0 = -((1 / ri) * dt + Math.sqrt(k)) * n[0];
            const rf1 = (1 / ri) - ((1 / ri) * dt + Math.sqrt(k)) * n[1];
            profile.push(rf0 * ((y * bw + gt) / rf1));
        } else { profile.push(0); }
    }
    const maxDisp = Math.max(...profile.map(Math.abs)) * 2;
    const img = new ImageData(w, h);
    for (let i = 0; i < img.data.length; i += 4) { img.data[i] = 128; img.data[i+1] = 128; img.data[i+3] = 255; }
    const rSq = rad * rad, rp1Sq = (rad + 1) ** 2, rmBwSq = Math.max(0, rad - bw) ** 2;
    const wB = w - rad * 2, hB = h - rad * 2;
    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            const idx = (y * w + x) * 4;
            const dx = x < rad ? x - rad : x >= w - rad ? x - rad - wB : 0;
            const dy = y < rad ? y - rad : y >= h - rad ? y - rad - hB : 0;
            const dSq = dx*dx + dy*dy;
            if (dSq <= rp1Sq && dSq >= rmBwSq) {
                const dist = Math.sqrt(dSq);
                const op = dSq < rSq ? 1 : 1 - (dist - rad) / (Math.sqrt(rp1Sq) - rad);
                const bIdx = Math.floor(Math.max(0, Math.min(1, (rad - dist) / bw)) * profile.length);
                const dVal = profile[Math.min(bIdx, profile.length - 1)] || 0;
                const dX = maxDisp > 0 ? (-(dist > 0 ? dx / dist : 0) * dVal) / maxDisp : 0;
                const dY = maxDisp > 0 ? (-(dist > 0 ? dy / dist : 0) * dVal) / maxDisp : 0;
                img.data[idx] = Math.max(0, Math.min(255, 128 + dX * 127 * op));
                img.data[idx+1] = Math.max(0, Math.min(255, 128 + dY * 127 * op));
            }
			else if (dSq < rmBwSq) {
                // --- LOGIKA BARU: DISTORSI PERBESARAN TENGAH (MAGNIFICATION) ---
                // 1. Cari titik pusat absolut dari elemen kaca
                const cx = w / 2;
                const cy = h / 2;
                const dxCenter = x - cx;
                const dyCenter = y - cy;
                
                // 2. Kekuatan perbesaran lensa (Ubah angka ini: 0.15 tipis, 0.4 sangat kuat/melengkung tajam)
                const magStrength = 0.15; 
                
                // 3. Blend fade-out halus agar menyatu dengan bezel tanpa retakan (seam) di batasnya
                const distInner = Math.sqrt(dSq);
                const innerRad = Math.max(0, rad - bw);
                const blend = innerRad > 0 ? Math.max(0, 1 - (distInner / innerRad)) : 1;
                
                // 4. Efek cembung: tarik arah pergeseran piksel ke arah pusat elemen
                const dX = maxDisp > 0 ? (-dxCenter / cx) * magStrength * blend : 0;
                const dY = maxDisp > 0 ? (-dyCenter / cy) * magStrength * blend : 0;
                
                // 5. Tulis pergeseran ke dalam map warna (Red untuk sumbu X, Green untuk sumbu Y)
                img.data[idx] = Math.max(0, Math.min(255, 128 + dX * 127));
                img.data[idx+1] = Math.max(0, Math.min(255, 128 + dY * 127));
            }
        }
    }
    return { imageData: img, maxDisp };
}
function buildSpecularMap(width, height, radius, bezelWidth) {
    const w = width, h = height, rad = radius, bw = bezelWidth;
    const img = new ImageData(w, h);
    const rSq = rad * rad, rp1Sq = (rad + 1) ** 2, rmSSq = Math.max(0, (rad - 1.5) ** 2);
    const wB = w - rad * 2, hB = h - rad * 2;
    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            const dx = x < rad ? x - rad : x >= w - rad ? x - rad - wB : 0;
            const dy = y < rad ? y - rad : y >= h - rad ? y - rad - hB : 0;
            const dSq = dx*dx + dy*dy;
            if (dSq <= rp1Sq && dSq >= rmSSq) {
                const dist = Math.sqrt(dSq);
                const op = dSq < rSq ? 1 : 1 - (dist - rad) / (Math.sqrt(rp1Sq) - rad);
                let val = 0;
                if (rad - dist >= 0 && rad - dist <= 1.5) val = (rad - dist) / 1.5;
                const c = 160 * (1 - (1 - val) ** 2) * op;
                const idx = (y * w + x) * 4;
                img.data[idx] = img.data[idx+1] = img.data[idx+2] = c;
                img.data[idx+3] = c;
            }
        }
    }
    return img;
}
function imageDataToDataURL(imgData) {
    const canvas = document.createElement('canvas');
    canvas.width = imgData.width;
    canvas.height = imgData.height;
    canvas.getContext('2d').putImageData(imgData, 0, 0);
    return canvas.toDataURL();
}
const liquidGlassCache = new WeakMap();
function applyLiquidGlassToElement(el, options = {}) {
    if (!el) return;
    
    // PERBAIKAN 1: Gunakan offsetWidth/Height alih-alih getBoundingClientRect 
    // agar mendapat angka pixel bulat yang akurat dengan border elemen
    const width = el.offsetWidth;
    const height = el.offsetHeight;
    if (width === 0 || height === 0) return;

    let radius = options.radius;
    if (!radius) {
        const borderRadius = window.getComputedStyle(el).borderRadius;
        const match = borderRadius.match(/(\d+)px/);
        radius = match ? parseInt(match[1], 10) : Math.min(width, height) / 2;
    }
    const bezelWidth = options.bezelWidth || 15;
    const glassThickness = options.glassThickness || 60;
    const refractiveIndex = options.refractiveIndex || 1.6;

    const rad = Math.min(radius, width / 2, height / 2);

    const disp = buildDisplacementMap(width, height, rad, bezelWidth, glassThickness, refractiveIndex);
    const spec = buildSpecularMap(width, height, rad, bezelWidth);
    const dispUrl = imageDataToDataURL(disp.imageData);
    const specUrl = imageDataToDataURL(spec);

    let svg = document.querySelector('#liquidGlassDynamicSvg');
    if (!svg) {
        svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.id = 'liquidGlassDynamicSvg';
        svg.style.position = 'absolute';
        svg.style.width = '0';
        svg.style.height = '0';
        svg.style.pointerEvents = 'none';
        document.body.appendChild(svg);
    }

    const filterId = `liquidGlass-${Math.random().toString(36).substr(2, 8)}`;
    const filter = document.createElementNS('http://www.w3.org/2000/svg', 'filter');
    filter.id = filterId;
    filter.setAttribute('x', '-50%');
    filter.setAttribute('y', '-50%');
    filter.setAttribute('width', '200%');
    filter.setAttribute('height', '200%');
    filter.setAttribute('color-interpolation-filters', 'sRGB');

    const blur = document.createElementNS('http://www.w3.org/2000/svg', 'feGaussianBlur');
    blur.setAttribute('in', 'SourceGraphic');
    blur.setAttribute('stdDeviation', '0.5');
    blur.setAttribute('result', 'blurred');

    const imgDisp = document.createElementNS('http://www.w3.org/2000/svg', 'feImage');
    imgDisp.setAttribute('href', dispUrl);
    // PERBAIKAN 2: Paksa x dan y ke 0 agar titik koordinat feImage 
    // mutlak terkunci di pojok kiri atas elemen dropdown
    imgDisp.setAttribute('x', '0'); 
    imgDisp.setAttribute('y', '0'); 
    imgDisp.setAttribute('width', width.toString());
    imgDisp.setAttribute('height', height.toString());
    imgDisp.setAttribute('preserveAspectRatio', 'none');
    imgDisp.setAttribute('result', 'displacement_map');

    const displace = document.createElementNS('http://www.w3.org/2000/svg', 'feDisplacementMap');
    displace.setAttribute('in', 'blurred');
    displace.setAttribute('in2', 'displacement_map');
    displace.setAttribute('scale', Math.min(80, disp.maxDisp * 2.5).toString());
    displace.setAttribute('xChannelSelector', 'R');
    displace.setAttribute('yChannelSelector', 'G');
    displace.setAttribute('result', 'displaced');

    const saturate = document.createElementNS('http://www.w3.org/2000/svg', 'feColorMatrix');
    saturate.setAttribute('in', 'displaced');
    saturate.setAttribute('type', 'saturate');
    saturate.setAttribute('values', '1.3');
    saturate.setAttribute('result', 'displaced_saturated');

    const imgSpec = document.createElementNS('http://www.w3.org/2000/svg', 'feImage');
    imgSpec.setAttribute('href', specUrl);
    // PERBAIKAN 3: Kunci juga posisi Specular (cahaya pantulan frame)
    imgSpec.setAttribute('x', '0'); 
    imgSpec.setAttribute('y', '0'); 
    imgSpec.setAttribute('width', width.toString());
    imgSpec.setAttribute('height', height.toString());
    imgSpec.setAttribute('preserveAspectRatio', 'none');
    imgSpec.setAttribute('result', 'specular_layer');

    const compTransfer = document.createElementNS('http://www.w3.org/2000/svg', 'feComponentTransfer');
    compTransfer.setAttribute('in', 'specular_layer');
    compTransfer.setAttribute('result', 'specular_faded');
    const feFuncA = document.createElementNS('http://www.w3.org/2000/svg', 'feFuncA');
    feFuncA.setAttribute('type', 'linear');
    feFuncA.setAttribute('slope', '1');
    compTransfer.appendChild(feFuncA);

    const blend = document.createElementNS('http://www.w3.org/2000/svg', 'feBlend');
    blend.setAttribute('in', 'specular_faded');
    blend.setAttribute('in2', 'displaced_saturated');
    blend.setAttribute('mode', 'screen');

    filter.appendChild(blur);
    filter.appendChild(imgDisp);
    filter.appendChild(displace);
    filter.appendChild(saturate);
    filter.appendChild(imgSpec);
    filter.appendChild(compTransfer);
    filter.appendChild(blend);

    svg.appendChild(filter);

    const oldFilterId = liquidGlassCache.get(el);
    if (oldFilterId) {
        const oldFilter = svg.querySelector(`#${oldFilterId}`);
        if (oldFilter) oldFilter.remove();
    }
    liquidGlassCache.set(el, filterId);

    // Terapkan ke style elemen
	setTimeout(() => {
		el.style.backgroundColor = 'rgba(20, 20, 30, 0.4)';
		el.style.border = '1px solid rgba(255, 255, 255, 0.25)';
		el.style.boxShadow = '0 12px 28px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.3), inset 0 0 12px rgba(255,255,255,0.08)';
		el.style.backdropFilter = `url(#${filterId}) saturate(150%) brightness(1.05) blur(2px)`;
		el.style.webkitBackdropFilter = `url(#${filterId}) saturate(150%) brightness(1.05) blur(2px)`;
	}, 10);
}
window.addEventListener('resize', () => {
    document.querySelectorAll('.dropdown').forEach(dd => {
        applyLiquidGlassToElement(dd, { bezelWidth: 15, glassThickness: 60, refractiveIndex: 1.6 });
    });
});

// ========== GLOBAL KEYBOARD SHORTCUTS ==========
document.addEventListener('keydown', (e) => {
    // Membaca jenis OS untuk kecocokan tombol (Meta = Command Mac, Ctrl = Windows)
    const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
    const cmdOrCtrl = isMac ? e.metaKey : e.ctrlKey;

    if (cmdOrCtrl) {
        const key = e.key.toLowerCase();
        
        // 1. EDIT COMMANDS (Diserahkan ke bawaan OS untuk keandalan API Clipboard)
        // Kita hanya memicu sinkronisasi perhitungan karakter dan UI
        if (['z', 'x', 'c', 'v', 'a'].includes(key)) {
            setTimeout(() => {
                const editor = getActiveEditor();
                if (editor) {
                    editor.dispatchEvent(new Event('input')); 
                }
            }, 50); // Jeda tipis menunggu aksi OS selesai
            return;
        }

        // 2. FILE COMMANDS (Mencegah fungsi bawaan browser)
        if (key === 's') {
            e.preventDefault(); // Mencegah popup "Save Page As" bawaan Chrome/Safari
            let tab = !isTabMode ? tabs[0] : (!isSplit ? tabs.find(t => t.id === focusedTabId) : tabs.find(t => t.id === leftTabId));
            if (tab) openSaveModal(tab, false);
        } else if (key === 'o') {
            e.preventDefault();
            document.getElementById('openDocFile').click();
        } else if (key === 'n') {
            e.preventDefault();
            document.getElementById('newDocFile').click();
        }
    }
});
</script>
